<div id="categoryDeleteModal"
     class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-xl max-w-md w-full">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
      <h3 class="text-lg font-semibold text-red-600">حذف دسته‌بندی</h3>
      <button class="text-gray-400 hover:text-gray-600"
              onclick="document.getElementById('modal-container').innerHTML=''">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <div class="px-6 py-4">
      <p class="text-gray-700">
        دسته‌بندی
        <span class="font-bold text-red-600">«{{ category.name }}»</span>
        حذف خواهد شد. این عمل قابل بازگشت نیست.
      </p>
    </div>

    <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
      <button type="button"
              class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
              onclick="document.getElementById('modal-container').innerHTML=''">انصراف</button>

      <!-- Submit and let the view send HX-Redirect -->
      <form method="post"
            hx-post="{{ request.path }}"
            hx-swap="none"     >    <!-- avoid flicker -->
        {% csrf_token %}
        <button class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
          حذف دسته‌بندی
        </button>
      </form>
    </div>
  </div>
</div>
