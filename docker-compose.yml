version: '3.9'

services:
  web:
    build: .
    command: python3 /code/manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - 8000:8000
    environment:
      - 'DJANGO_SECRET_KEY=${DOCKER_COMPOSE_DJANGO_SECRET_KEY}'
      - 'ZARINPAL_MERCHANT=${ZARINPAL_MERCHANT_ID}'

  db:
    image: postgres:14
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
